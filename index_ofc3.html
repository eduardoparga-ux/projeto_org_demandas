<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Frentes e Demandas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12141b;
    --bg-soft: #171a23;
    --panel: #1c202b;
    --panel-hover: #21252f;
    --border: #2a2f3c;
    --border-soft: #23273233;
    --text: #eef0f5;
    --text-dim: #9198a8;
    --text-faint: #5c6272;
    --accent: #d4a154;
    --accent-soft: #d4a15422;
    --aberto: #6d8ce8;
    --aberto-soft: #6d8ce81c;
    --andamento: #e0a940;
    --andamento-soft: #e0a9401c;
    --finalizado: #4fb98a;
    --finalizado-soft: #4fb98a1c;
    --danger: #e2574c;
    --danger-soft: #e2574c1c;
    --radius: 14px;
    --radius-sm: 9px;
    font-family: 'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(circle at 15% -10%, #23283a55, transparent 45%),
      radial-gradient(circle at 90% 0%, #2a2f3c44, transparent 40%),
      var(--bg);
    color: var(--text);
    min-height:100vh;
    display:flex;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width: 280px;
    flex-shrink:0;
    background: var(--bg-soft);
    border-right: 1px solid var(--border);
    display:flex;
    flex-direction:column;
    height:100vh;
    position:sticky;
    top:0;
  }
  .sidebar-head{
    padding: 22px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .brand{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size: 17px;
    letter-spacing: -0.01em;
    display:flex;
    align-items:center;
    gap:9px;
  }
  .brand-dot{
    width:9px;height:9px;border-radius:50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .brand-sub{
    margin-top:4px;
    font-size: 11.5px;
    color: var(--text-faint);
    font-family:'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
  }

  .fronts-list{
    flex:1;
    overflow-y:auto;
    padding: 10px 10px 6px;
    display:flex;
    flex-direction:column;
    gap: 3px;
  }

  .fronts-section-label{
    padding: 8px 6px 5px;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-faint);
    font-family:'JetBrains Mono', monospace;
  }

  .item-logo-thumb{
    width:20px; height:20px;
    border-radius:4px;
    object-fit:cover;
    flex-shrink:0;
    background: #ffffff10;
  }

  /* ---- front item ---- */
  .front-item{
    display:flex;
    flex-direction:column;
    gap:6px;
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    cursor:pointer;
    color: var(--text-dim);
    transition: background .15s ease, color .15s ease;
    border: 1px solid transparent;
    position:relative;
  }
  .front-item:hover{ background: var(--panel-hover); color: var(--text); }
  .front-item.active{
    background: var(--accent-soft);
    color: var(--text);
    border-color: #d4a15433;
  }
  .front-item.archived{ opacity: .68; }
  .front-item.archived:hover{ opacity: 1; }

  .front-item-top{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .front-status-dot{
    width:7px; height:7px; border-radius:50%; flex-shrink:0;
  }
  .front-status-dot.ativa{ background: var(--finalizado); box-shadow:0 0 0 2px var(--finalizado-soft); }
  .front-status-dot.pausada{ background: var(--andamento); box-shadow:0 0 0 2px var(--andamento-soft); }
  .front-status-dot.arquivada{ background: var(--text-faint); }

  .front-name{
    font-size: 13.5px;
    font-weight: 500;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    flex:1;
    min-width:0;
  }
  .front-count{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    background: #ffffff08;
    padding: 1px 7px;
    border-radius: 20px;
    flex-shrink:0;
  }
  .front-item.active .front-count{ color: var(--accent); background: #d4a15422; }

  .front-menu-btn{
    width:20px; height:20px;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:none; border:none; cursor:pointer;
    color: var(--text-faint);
    border-radius: 5px;
    font-size: 13px;
    line-height:1;
    opacity:.55;
    transition: all .12s ease;
  }
  .front-menu-btn:hover{ opacity:1; background:#ffffff14; color:var(--text); }

  .front-item-bottom{
    display:flex;
    align-items:center;
    gap:7px;
  }
  .front-progress-track{
    flex:1;
    height:4px;
    background:#ffffff0f;
    border-radius:3px;
    overflow:hidden;
  }
  .front-progress-fill{
    height:100%;
    background: var(--finalizado);
    border-radius:3px;
    transition: width .2s ease;
  }
  .front-auto-dot{
    width:6px; height:6px; border-radius:50%; flex-shrink:0;
  }
  .front-auto-dot.red{ background: var(--danger); }
  .front-auto-dot.yellow{ background: var(--andamento); }
  .front-auto-dot.green{ background: var(--finalizado); }
  .front-auto-dot.none{ background: var(--text-faint); opacity:.4; }

  /* ---- dropdown menu ---- */
  .front-menu-dropdown{
    position:absolute;
    top: 32px;
    right: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
    min-width: 190px;
    box-shadow: 0 14px 34px -10px #000000aa;
    z-index: 30;
    display:none;
    flex-direction:column;
    gap:2px;
  }
  .front-menu-dropdown.open{ display:flex; }
  .front-menu-item{
    padding: 8px 10px;
    border-radius: 7px;
    font-size: 12.5px;
    color: var(--text-dim);
    cursor:pointer;
    background:none;
    border:none;
    text-align:left;
    font-family: inherit;
    width:100%;
  }
  .front-menu-item:hover{ background: var(--panel-hover); color: var(--text); }
  .front-menu-item.danger{ color: var(--danger); }
  .front-menu-item.danger:hover{ background: var(--danger-soft); }
  .front-menu-divider{ height:1px; background:var(--border); margin:4px 2px; }

  .add-front-btn, .add-folder-btn{
    margin: 6px 10px 0;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--text-faint);
    font-size: 13px;
    font-family: inherit;
    cursor:pointer;
    text-align:left;
    transition: all .15s ease;
  }
  .add-front-btn:hover, .add-folder-btn:hover{
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }

  /* ---- folders ---- */
  .folder-group{ margin-bottom:4px; }
  .folder-header{
    display:flex;
    align-items:center;
    gap:7px;
    padding: 8px 8px 8px 6px;
    border-radius: var(--radius-sm);
    cursor:pointer;
    color: var(--text-dim);
    position:relative;
  }
  .folder-header:hover{ background: var(--panel-hover); color: var(--text); }
  .folder-chevron{
    font-size:9px;
    width:10px;
    flex-shrink:0;
    text-align:center;
    color: var(--text-faint);
    transition: transform .15s ease;
    display:inline-block;
  }
  .folder-chevron.open{ transform: rotate(90deg); }
  .folder-icon{ font-size:13px; flex-shrink:0; opacity:.85; }
  .folder-name{
    font-size:13px;
    font-weight:600;
    flex:1;
    min-width:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .folder-count{
    font-family:'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--text-faint);
    background: #ffffff08;
    padding: 1px 6px;
    border-radius: 20px;
    flex-shrink:0;
  }
  .folder-add-btn, .folder-menu-btn{
    width:20px; height:20px;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:none; border:none; cursor:pointer;
    color: var(--text-faint);
    border-radius: 5px;
    font-size: 13px;
    line-height:1;
    opacity:.55;
    transition: all .12s ease;
  }
  .folder-add-btn:hover, .folder-menu-btn:hover{ opacity:1; background:#ffffff14; color:var(--text); }
  
  .folder-children{
    display:flex;
    flex-direction:column;
    gap:3px;
    padding-left:12px;
    margin-left:8px;
    margin-top:2px;
    border-left: 1px solid var(--border);
  }
  .folder-children.collapsed{ display:none; }
  .folder-empty{
    padding: 6px 8px 6px 12px;
    color: var(--text-faint);
    font-size: 11.5px;
  }

  .unfiled-label{
    padding: 8px 6px 5px;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-faint);
    font-family:'JetBrains Mono', monospace;
    margin-top:4px;
  }
  .archived-folder-block{ padding: 4px 2px 10px; }
  .archived-folder-head{
    display:flex;
    align-items:center;
    gap:7px;
    padding: 6px 6px;
    font-size: 12.5px;
    font-weight:600;
    color: var(--text-dim);
  }
  .archived-folder-actions{ display:flex; gap:6px; margin-left:auto; }
  .archived-folder-actions button{
    background:none;
    border:1px solid var(--border);
    color: var(--text-faint);
    font-size: 10.5px;
    padding: 3px 8px;
    border-radius: 20px;
    cursor:pointer;
    font-family: inherit;
    transition: all .12s ease;
  }
  .archived-folder-actions button:hover{ color: var(--text); border-color: var(--accent); }

  /* ---- history section ---- */
  .history-toggle{
    display:flex;
    align-items:center;
    gap:7px;
    padding: 10px 8px;
    margin-top: 4px;
    border-top: 1px solid var(--border);
    cursor:pointer;
    color: var(--text-faint);
    font-size: 11px;
    font-family:'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    user-select:none;
  }
  .history-toggle:hover{ color: var(--text-dim); }
  .history-chevron{
    font-size: 9px;
    transition: transform .15s ease;
    display:inline-block;
  }
  .history-toggle.open .history-chevron{ transform: rotate(90deg); }
  .history-toggle-count{ margin-left:auto; opacity:.7; }

  .history-body{ display:none; flex-direction:column; gap:3px; }
  .history-body.open{ display:flex; }

  .history-search{ padding: 2px 6px 8px; }
  .history-search input{
    width:100%;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 12px;
    color: var(--text);
    font-family: inherit;
    outline:none;
    transition: border-color .15s ease;
  }
  .history-search input::placeholder{ color: var(--text-faint); }
  .history-search input:focus{ border-color: var(--accent); }

  .history-empty{
    padding: 10px 8px 14px;
    color: var(--text-faint);
    font-size: 12px;
  }

  .sidebar-foot{
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-faint);
    font-family:'JetBrains Mono', monospace;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .sync-row{ display:flex; align-items:center; gap:7px; }
  .sync-dot{
    width:6px;height:6px;border-radius:50%;
    background: var(--finalizado);
    flex-shrink:0;
    transition: background .2s ease;
  }
  .sync-dot.saving{ background: var(--andamento); animation: pulse 1s infinite ease-in-out; }
  .sync-dot.error{ background: var(--danger); }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.35} }
  .sync-retry{
    margin-left:auto;
    background:none;border:none;color:var(--danger);
    font-family:inherit; font-size:11px; cursor:pointer;
    text-decoration:underline;
    display:none;
  }
  .sync-retry.show{ display:inline; }

  .backup-btns{ display:flex; gap:6px; }
  .backup-btn{
    flex:1;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 10.5px;
    cursor:pointer;
    text-align:center;
    transition: all .12s ease;
  }
  .backup-btn:hover{ color: var(--text); border-color: var(--accent); }

  /* ---------- BANNER EM ATIVIDADE ---------- */
  .focus-banner{
    background: linear-gradient(90deg, #1d2333 0%, #171a23 100%);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 14px 20px;
    margin-bottom: 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    box-shadow: 0 8px 24px -10px var(--accent-soft);
  }
  .focus-info{ display:flex; flex-direction:column; gap:4px; min-width:0; }
  .focus-tag{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size: 10.5px;
    font-family:'JetBrains Mono', monospace;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
  }
  .focus-title{
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .focus-breadcrumb{
    font-size: 12px;
    color: var(--text-dim);
    font-family:'JetBrains Mono', monospace;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .focus-right{ display:flex; align-items:center; gap:14px; flex-shrink:0; }
  .focus-timer{
    font-family:'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    background: #ffffff0a;
    padding: 6px 12px;
    border-radius: 8px;
    color: var(--accent);
    border: 1px solid #d4a15433;
  }
  .focus-done-btn{
    background: var(--finalizado);
    color: #0d261b;
    border:none;
    font-weight:700;
    font-size: 12.5px;
    padding: 8px 14px;
    border-radius: 8px;
    cursor:pointer;
    transition: filter .12s ease;
  }
  .focus-done-btn:hover{ filter: brightness(1.1); }
  .focus-clear-btn{
    background: transparent;
    color: var(--text-faint);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor:pointer;
  }
  .focus-clear-btn:hover{ color: var(--text); border-color: var(--text-dim); }

  /* ---------- MAIN ---------- */
  .main{
    flex:1;
    min-width:0;
    padding: 30px 40px 60px;
    max-width: 1400px;
  }
  .main-nav{
    display:flex;
    gap:10px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
    flex-wrap: wrap;
  }
  .nav-tab{
    background:none;
    border:none;
    color: var(--text-faint);
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size: 15px;
    padding: 6px 12px;
    border-radius: 8px;
    cursor:pointer;
    transition: all .15s ease;
  }
  .nav-tab:hover{ color: var(--text); background: var(--panel-hover); }
  .nav-tab.active{ color: var(--accent); background: var(--accent-soft); }

  .main-head{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    margin-bottom: 22px;
    gap: 20px;
    flex-wrap:wrap;
  }
  .front-title-row{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap: 8px;
  }
  .main-front-logo{
    width:32px; height:32px;
    border-radius: 6px;
    object-fit:cover;
    background:#ffffff10;
  }
  .front-title{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size: 26px;
    letter-spacing:-0.01em;
    outline:none;
    border-radius:6px;
    padding: 2px 6px;
    margin-left:-6px;
    cursor:text;
  }
  .front-title:hover, .front-title:focus{ background: var(--panel-hover); }
  .front-status-pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size: 11px;
    font-family:'JetBrains Mono', monospace;
    padding: 4px 10px;
    border-radius: 20px;
    margin-left: 6px;
  }
  .front-status-pill .dot{ width:6px; height:6px; border-radius:50%; }
  .front-status-pill.ativa{ background: var(--finalizado-soft); color: var(--finalizado); }
  .front-status-pill.ativa .dot{ background: var(--finalizado); }
  .front-status-pill.pausada{ background: var(--andamento-soft); color: var(--andamento); }
  .front-status-pill.pausada .dot{ background: var(--andamento); }
  .front-status-pill.arquivada{ background: #ffffff10; color: var(--text-faint); }
  .front-status-pill.arquivada .dot{ background: var(--text-faint); }

  .front-meta{
    font-family:'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--text-faint);
    margin-top:5px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .front-meta-progress{
    display:flex;
    align-items:center;
    gap:6px;
  }
  .front-meta-progress .track{
    width:70px;
    height:4px;
    background:#ffffff0f;
    border-radius:3px;
    overflow:hidden;
  }
  .front-meta-progress .fill{
    height:100%;
    background: var(--finalizado);
    border-radius:3px;
  }

  .head-actions{ display:flex; align-items:center; gap:10px; }

  .restore-inline-btn{
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    font-weight:600;
    font-size: 13px;
    padding: 9px 16px;
    border-radius: 10px;
    cursor:pointer;
    font-family: inherit;
    transition: all .15s ease;
  }
  .restore-inline-btn:hover{ border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

  .new-demand-btn{
    background: var(--accent);
    color: #1a1508;
    border:none;
    font-weight:600;
    font-size: 13.5px;
    padding: 10px 18px;
    border-radius: 10px;
    cursor:pointer;
    font-family: inherit;
    box-shadow: 0 1px 0 #ffffff22 inset, 0 6px 16px -6px #d4a15477;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .new-demand-btn:hover{ transform: translateY(-1px); box-shadow: 0 1px 0 #ffffff22 inset, 0 10px 20px -6px #d4a15499; }
  .new-demand-btn:active{ transform: translateY(0); }

  .filters{
    display:flex;
    gap:8px;
    margin-bottom: 24px;
    flex-wrap:wrap;
  }
  .filter-chip{
    padding: 7px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text-dim);
    font-size: 12.5px;
    font-weight:500;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:7px;
    transition: all .15s ease;
  }
  .filter-chip:hover{ border-color: var(--text-faint); color: var(--text); }
  .filter-chip.active{
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .filter-chip .n{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    opacity: .65;
  }

  .board{
    display:grid;
    grid-template-columns: repeat(3, minmax(0,1fr));
    gap: 18px;
  }
  @media (max-width: 980px){ .board{ grid-template-columns: 1fr; } }

  .column{
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    min-height: 120px;
  }
  .column-head{
    display:flex;
    align-items:center;
    gap:9px;
    padding: 4px 4px 14px;
    font-weight:600;
    font-size: 13px;
  }
  .col-dot{ width:8px; height:8px; border-radius:50%; }
  .col-dot.aberto{ background: var(--aberto); }
  .col-dot.andamento{ background: var(--andamento); }
  .col-dot.finalizado{ background: var(--finalizado); }
  .column-count{
    margin-left:auto;
    font-family:'JetBrains Mono', monospace;
    color: var(--text-faint);
    font-size: 11.5px;
  }

  .cards{ display:flex; flex-direction:column; gap:10px; }

  .empty-col{
    color: var(--text-faint);
    font-size: 12.5px;
    text-align:center;
    padding: 26px 10px;
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
  }

  .card{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 14px 12px;
    transition: border-color .15s ease, transform .1s ease;

    border-color: var(--accent);

  .card-actions{ display:flex; gap:4px; flex-shrink:0; }

  .stamp:active{ transform: scale(.96); }

  .stamp.aberto{ background: var(--aberto-soft); color: var(--aberto); }

  .focus-trigger-btn{
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-faint);
    font-family:'JetBrains Mono', monospace;
    font-size: 10.5px;
    padding: 3px 8px;
    border-radius: 12px;
    cursor:pointer;
    transition: all .12s ease;
  }
  .focus-trigger-btn:hover{ color: var(--accent); border-color: var(--accent); }
  .focus-trigger-btn.active{ background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

  .card-breadcrumb-path{
    margin-top: 8px;
    font-size: 11px;
    font-family:'JetBrains Mono', monospace;
    color: var(--accent);
    opacity: 0.85;
  }

  .note-area{
    width:100%;
    margin-top: 8px;
    background: var(--bg-soft);
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 12.5px;
    line-height:1.5;
    padding: 8px 10px;
    resize: none;
    min-height: 40px;
    outline:none;
    transition: border-color .15s ease;
  }
  .note-area::placeholder{ color: var(--text-faint); }
  .note-area:focus{ border-color: var(--accent); color: var(--text); }

  .card-date{
    margin-top: 7px;
    font-size: 10.5px;
    color: var(--text-faint);
    font-family:'JetBrains Mono', monospace;
  }

  /* VISÃO GERAL DE DEMANDAS ABERTAS */
  .overview-grid{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  /* HISTÓRICO DE TEMPOS / LOGS DIÁRIOS */
  .time-logs-container{
    display:flex;
    flex-direction:column;
    gap:20px;
  }
  .day-log-card{
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .day-log-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .day-log-title{
    font-family:'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .day-log-total{
    font-family:'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 4px 10px;
    border-radius: 20px;
  }
  .log-items-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .log-item-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: var(--panel);
    border: 1px solid var(--border-soft);
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    gap:12px;
  }
  .log-item-main{ min-width:0; flex:1; }
  .log-item-task{ font-size: 13.5px; font-weight: 600; color: var(--text); }
  .log-item-path{ font-size: 11px; font-family:'JetBrains Mono', monospace; color: var(--text-faint); margin-top:2px; }
  .log-item-meta{
    display:flex;
    align-items:center;
    gap:12px;
    flex-shrink:0;
    font-family:'JetBrains Mono', monospace;
    font-size: 11.5px;
  }
  .log-item-time{ color: var(--text-dim); }
  .log-item-duration{
    color: var(--finalizado);
    font-weight:600;
    background: var(--finalizado-soft);
    padding: 3px 8px;

  .empty-state{
    text-align:center;
    padding: 60px 20px;

  .empty-state h3{
    font-family:'Space Grotesk', sans-serif;

  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:#33384700; }
  .fronts-list::-webkit-scrollbar-thumb{ background:#33384766; border-radius:8px; }

  /* ---- rename modal ---- */
  .modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:#0a0b0f99;
    backdrop-filter: blur(2px);
    z-index: 100;

  }
  .modal-overlay.open{ display:flex; }
  .modal-box{
    width: 320px;

  .modal-title{
    font-family:'Space Grotesk', sans-serif;

  .modal-input{
    width:100%;
    padding: 10px 12px;

  .modal-input:focus{ border-color: var(--accent); }
  .modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:8px;
    margin-top: 14px;

  .modal-btn{

  .modal-btn:hover{ background: var(--panel-hover); color: var(--text); }
  .modal-btn.primary{
    background: var(--accent);

    font-weight:600;
  }
  .modal-btn.primary:hover{ filter: brightness(1.08); }
</style>
</head>
<body>

<input type="file" id="logoUploaderInput" accept="image/*" style="display:none" />
<input type="file" id="jsonImporterInput" accept=".json" style="display:none" />

<aside class="sidebar">
  <div class="sidebar-head">
    <div class="brand">
      <span class="brand-dot"></span>
      <span>Central de Frentes</span>
    </div>
    <div class="brand-sub" id="totalMeta">carregando…</div>
  </div>
  <div class="fronts-list" id="frontsList"></div>
  <button class="add-folder-btn" id="addFolderBtn">📁 Nova pasta</button>
  <button class="add-front-btn" id="addFrontBtn">+ Nova frente</button>
  <div class="sidebar-foot">
    <div class="sync-row">
      <span class="sync-dot" id="syncDot"></span>
      <span id="syncLabel">sincronizado</span>
      <button class="sync-retry" id="syncRetryBtn">tentar de novo</button>
    </div>
    <div class="backup-btns">
      <button class="backup-btn" id="exportBackupBtn">📥 Exportar</button>
      <button class="backup-btn" id="importBackupBtn">📤 Importar</button>
    </div>
  </div>
</aside>

<main class="main" id="main">
</main>

<div class="modal-overlay" id="renameModalOverlay">
  <div class="modal-box">
    <div class="modal-title" id="renameModalTitle">Renomear</div>
    <input type="text" class="modal-input" id="renameModalInput" spellcheck="false" />
    <div class="modal-actions">
      <button class="modal-btn" id="renameModalCancel">Cancelar</button>
      <button class="modal-btn primary" id="renameModalSave">Salvar</button>
    </div>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'central-frentes-data';
  const STATUS = ['aberto','andamento','finalizado'];
  const STATUS_LABEL = { aberto:'Aberto', andamento:'Em andamento', finalizado:'Finalizado' };
  const FRONT_STATUS_LABEL = { ativa:'Ativa', pausada:'Pausada', arquivada:'Arquivada' };

  let state = {
    fronts: [],
    demands: [],
    folders: [],
    timeLogs: [], // Lista de logs: { id, demandTitle, breadcrumb, startTime, endTime, durationSec, dateKey }
    activeFrontId: null,
    activeFilter: 'all',
    viewTab: 'front', // 'front' | 'global' | 'history'
    activeDemandId: null,
    activeDemandStartTime: null,
    historyOpen: false,
    historySearch: '',
    openMenuId: null,
    moveMenuFrontId: null,
    collapsedFolders: {},
    folderMenuOpenId: null,
    foldersArchivedOpen: false
  };

  let saveTimer = null;
  let timerInterval = null;

  const uid = () => Math.random().toString(36).slice(2, 10);

  async function loadData(){
    setSyncStatus('saving', 'carregando…');
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        state.fronts = parsed.fronts || [];
        state.demands = parsed.demands || [];
        state.folders = parsed.folders || [];
        state.timeLogs = parsed.timeLogs || [];
        state.activeDemandId = parsed.activeDemandId || null;
        state.activeDemandStartTime = parsed.activeDemandStartTime || null;
      }
    }catch(e){}

    state.fronts.forEach(f => {
      if(!f.status) f.status = 'ativa';
      if(f.folderId === undefined) f.folderId = null;
      if(!f.logo) f.logo = null;
    });
    if(!Array.isArray(state.folders)) state.folders = [];
    state.folders.forEach(fo => {
      if(typeof fo.archived !== 'boolean') fo.archived = false;
      if(fo.parentId === undefined) fo.parentId = null;
      if(!fo.logo) fo.logo = null;
    });
    if(!Array.isArray(state.timeLogs)) state.timeLogs = [];

    if(state.fronts.length === 0){
      const f1 = { id: uid(), name: 'Minha primeira frente', createdAt: Date.now(), status: 'ativa', logo: null, folderId: null };
      state.fronts = [f1];
      state.activeFrontId = f1.id;
      await persist(true);
    } else {
      const firstActive = state.fronts.find(f => f.status !== 'arquivada');
      state.activeFrontId = (firstActive || state.fronts[0]).id;
    }

    startTimer();
    setSyncStatus('ok', 'sincronizado');
    render();
  }

  function scheduleSave(){
    setSyncStatus('saving', 'salvando…');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => persist(false), 300);
  }

  async function persist(immediate){
    const payload = JSON.stringify({
      fronts: state.fronts,
      demands: state.demands,
      folders: state.folders,
      timeLogs: state.timeLogs,
      activeDemandId: state.activeDemandId,
      activeDemandStartTime: state.activeDemandStartTime
    });
    try{
      localStorage.setItem(STORAGE_KEY, payload);
      setSyncStatus('ok', 'sincronizado');
    }catch(err){
      setSyncStatus('error', 'falha ao salvar');
    }
  }

  function setSyncStatus(kind, label){
    const dot = document.getElementById('syncDot');
    const lbl = document.getElementById('syncLabel');
    const retryBtn = document.getElementById('syncRetryBtn');
    dot.className = 'sync-dot' + (kind === 'saving' ? ' saving' : kind === 'error' ? ' error' : '');
    lbl.textContent = label;
    retryBtn.className = 'sync-retry' + (kind === 'error' ? ' show' : '');
  }

  document.getElementById('syncRetryBtn').addEventListener('click', () => persist(true));
  document.getElementById('addFolderBtn').addEventListener('click', () => createFolder());

  // EXPORTAR & IMPORTAR BACKUP JSON
  document.getElementById('exportBackupBtn').addEventListener('click', () => {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
    const dlAnchor = document.createElement('a');
    dlAnchor.setAttribute("href", dataStr);
    dlAnchor.setAttribute("download", `central-frentes-backup-${new Date().toISOString().slice(0,10)}.json`);
    document.body.appendChild(dlAnchor);
    dlAnchor.click();
    dlAnchor.remove();
  });

  const jsonImporterInput = document.getElementById('jsonImporterInput');
  document.getElementById('importBackupBtn').addEventListener('click', () => jsonImporterInput.click());
  jsonImporterInput.addEventListener('change', () => {
    const file = jsonImporterInput.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try{
        const parsed = JSON.parse(e.target.result);
        if(parsed.fronts && parsed.demands){
          state.fronts = parsed.fronts;
          state.demands = parsed.demands;
          state.folders = parsed.folders || [];
          state.timeLogs = parsed.timeLogs || [];
          state.activeDemandId = parsed.activeDemandId || null;
          state.activeDemandStartTime = parsed.activeDemandStartTime || null;
          scheduleSave();
          render();
          alert('Backup importado com sucesso!');
        }
      }catch(err){
        alert('Arquivo de backup inválido.');
      }
    };
    reader.readAsText(file);
    jsonImporterInput.value = '';
  });

  // LOGO UPLOADER HANDLER
  const logoUploaderInput = document.getElementById('logoUploaderInput');
  let currentLogoTarget = null;

  function triggerLogoUpload(type, id){
    currentLogoTarget = { type, id };
    logoUploaderInput.click();
  }

  logoUploaderInput.addEventListener('change', () => {
    const file = logoUploaderInput.files[0];
    if(!file || !currentLogoTarget) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const size = 128;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const ratio = Math.max(size / img.width, size / img.height);
        const w = img.width * ratio, h = img.height * ratio;
        ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
        
        const base64Img = canvas.toDataURL('image/png');

        if(currentLogoTarget.type === 'front'){
          const f = state.fronts.find(x => x.id === currentLogoTarget.id);
          if(f) f.logo = base64Img;
        } else if(currentLogoTarget.type === 'folder'){
          const fo = state.folders.find(x => x.id === currentLogoTarget.id);
          if(fo) fo.logo = base64Img;
        }

        scheduleSave();
        render();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    logoUploaderInput.value = '';
  });

  function removeLogo(type, id){
    if(type === 'front'){
      const f = state.fronts.find(x => x.id === id);
      if(f) f.logo = null;
    } else if(type === 'folder'){
      const fo = state.folders.find(x => x.id === id);
      if(fo) fo.logo = null;
    }
    scheduleSave();
    render();
  }

  // ---------- BREADCRUMB BUILDER ----------
  function getBreadcrumbPath(frontId){
    const front = state.fronts.find(f => f.id === frontId);
    if(!front) return '';

    let path = [];
    path.push(front.name);

    let currentFolderId = front.folderId;
    while(currentFolderId){
      const folder = state.folders.find(fo => fo.id === currentFolderId);
      if(folder){
        path.unshift(folder.name);
        currentFolderId = folder.parentId;
      } else {
        break;
      }
    }

    return path.join(' › ');
  }

  // ---------- REGISTRO DE LOGS DE TEMPO ----------
  function logActiveDemandTime(){
    if(!state.activeDemandId || !state.activeDemandStartTime) return;

    const endTime = Date.now();
    const durationSec = Math.floor((endTime - state.activeDemandStartTime) / 1000);

    // Salva apenas se durou mais de 5 segundos
    if(durationSec >= 5){
      const d = state.demands.find(x => x.id === state.activeDemandId);
      const title = d ? d.title : 'Demanda excluída';
      const path = d ? getBreadcrumbPath(d.frontId) : '';

      const startDateObj = new Date(state.activeDemandStartTime);
      const dateKey = startDateObj.toISOString().slice(0, 10); // YYYY-MM-DD

      state.timeLogs.unshift({
        id: uid(),
        demandTitle: title,
        breadcrumb: path,
        startTime: state.activeDemandStartTime,
        endTime: endTime,
        durationSec: durationSec,
        dateKey: dateKey
      });
    }

    state.activeDemandId = null;
    state.activeDemandStartTime = null;
  }

  function setFocusDemand(demandId){
    if(state.activeDemandId === demandId){
      logActiveDemandTime();
    } else {
      if(state.activeDemandId){
        logActiveDemandTime();
      }
      state.activeDemandId = demandId;
      state.activeDemandStartTime = Date.now();
      
      const d = state.demands.find(x => x.id === demandId);
      if(d && d.status === 'aberto') d.status = 'andamento';
    }
    scheduleSave();
    render();
  }

  function formatSeconds(totalSec){
    const hrs = Math.floor(totalSec / 3600);
    const mins = Math.floor((totalSec % 3600) / 60);
    const secs = totalSec % 60;

    let res = [];
    if(hrs > 0) res.push(`${hrs}h`);
    if(mins > 0 || hrs > 0) res.push(`${mins}m`);
    res.push(`${secs}s`);

    return res.join(' ');
  }

  function startTimer(){
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      const timerEl = document.getElementById('focusTimerDisplay');
      if(timerEl && state.activeDemandStartTime){
        const diff = Math.floor((Date.now() - state.activeDemandStartTime) / 1000);
        const hrs = String(Math.floor(diff / 3600)).padStart(2, '0');
        const mins = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
        const secs = String(diff % 60).padStart(2, '0');
        timerEl.textContent = `${hrs}:${mins}:${secs}`;
      }
    }, 1000);
  }

  // ---------- DERIVED ----------
  function frontDemands(frontId){
    return state.demands.filter(d => d.frontId === frontId);
  }

  function frontProgress(frontId){
    const all = frontDemands(frontId);
    if(all.length === 0) return 0;
    const done = all.filter(d => d.status === 'finalizado').length;
    return Math.round((done / all.length) * 100);
  }

  function frontAutoStatus(frontId){
    const all = frontDemands(frontId);
    if(all.length === 0) return 'none';
    if(all.every(d => d.status === 'finalizado')) return 'green';
    if(all.some(d => d.status === 'andamento')) return 'yellow';
    if(all.some(d => d.status === 'aberto')) return 'red';
    return 'none';
  }

  // ---------- MODAL RENOMEAR ----------
  const renameModalOverlay = document.getElementById('renameModalOverlay');
  const renameModalTitle = document.getElementById('renameModalTitle');
  const renameModalInput = document.getElementById('renameModalInput');
  const renameModalCancel = document.getElementById('renameModalCancel');
  const renameModalSave = document.getElementById('renameModalSave');
  let renameModalCallback = null;

  function openRenameModal(title, currentValue, onSave){
    renameModalTitle.textContent = title;
    renameModalInput.value = currentValue || '';
    renameModalCallback = onSave;
    renameModalOverlay.classList.add('open');
    setTimeout(() => {
      renameModalInput.focus();
      renameModalInput.select();
    }, 10);
  }

  function closeRenameModal(){
    renameModalOverlay.classList.remove('open');
    renameModalCallback = null;
  }

  function confirmRenameModal(){
    const val = renameModalInput.value.trim();
    const cb = renameModalCallback;
    if(val && cb){ cb(val); }
    closeRenameModal();
  }

  renameModalSave.onclick = confirmRenameModal;
  renameModalCancel.onclick = closeRenameModal;

  // ---------- FRONT ACTIONS ----------
  function renameFront(front){
    openRenameModal('Renomear frente', front.name, (val) => {
      front.name = val;
      scheduleSave();
      render();
    });
  }

  function togglePauseFront(front){
    front.status = front.status === 'pausada' ? 'ativa' : 'pausada';
    scheduleSave();
    render();
  }

  function archiveFront(front){
    front.status = 'arquivada';
    scheduleSave();
    render();
  }

  function restoreFront(front){
    front.status = 'ativa';
    scheduleSave();
    render();
  }

  function deleteFrontForever(front){
    const ok = confirm(`Excluir definitivamente "${front.name}"?\n\nEsta ação não pode ser desfeita e removerá também todas as demandas desta frente.`);
    if(!ok) return;
    
    state.fronts = state.fronts.filter(f => f.id !== front.id);
    state.demands = state.demands.filter(d => d.frontId !== front.id);
    
    if(state.activeFrontId === front.id){
      const remaining = state.fronts.filter(f => f.status !== 'arquivada');
      state.activeFrontId = remaining.length ? remaining[0].id : (state.fronts[0] ? state.fronts[0].id : null);
    }
    
    scheduleSave();
    render();
  }

  function selectFront(id){
    state.activeFrontId = id;
    state.activeFilter = 'all';
    state.viewTab = 'front';
    state.openMenuId = null;
    render();
  }

  function moveFrontToFolder(front, folderId){
    front.folderId = folderId || null;
    scheduleSave();
    render();
  }

  // ---------- FOLDER ACTIONS ----------
  function createFolder(parentId = null){
    const fo = { id: uid(), name: 'Nova pasta', createdAt: Date.now(), archived: false, parentId: parentId, logo: null };
    state.folders.push(fo);
    if(parentId) state.collapsedFolders[parentId] = false;
    scheduleSave();
    render();
  }

  function renameFolder(fo){
    openRenameModal('Renomear pasta', fo.name, (val) => {
      fo.name = val;
      scheduleSave();
      render();
    });
  }

  function archiveFolder(fo){
    fo.archived = true;
    scheduleSave();
    render();
  }

  function restoreFolder(fo){
    fo.archived = false;
    scheduleSave();
    render();
  }

  function getAllSubFolderIds(folderId){
    let ids = [folderId];
    const subs = state.folders.filter(f => f.parentId === folderId);
    subs.forEach(s => {
      ids = ids.concat(getAllSubFolderIds(s.id));
    });
    return ids;
  }

  function deleteFolderForever(fo){
    const allFolderIds = getAllSubFolderIds(fo.id);
    const frontIds = state.fronts.filter(f => allFolderIds.includes(f.folderId)).map(f => f.id);
    
    const msg = `Excluir definitivamente a pasta "${fo.name}"${allFolderIds.length > 1 ? ' e suas subpastas' : ''}?\n\nTodas as ${frontIds.length} frentes contidas também serão permanentemente apagadas.`;
    if(!confirm(msg)) return;

    state.folders = state.folders.filter(f => !allFolderIds.includes(f.id));
    state.fronts = state.fronts.filter(f => !allFolderIds.includes(f.folderId));
    state.demands = state.demands.filter(d => !frontIds.includes(d.frontId));

    if(frontIds.includes(state.activeFrontId)){
      const remaining = state.fronts.filter(f => f.status !== 'arquivada');
      state.activeFrontId = remaining.length ? remaining[0].id : (state.fronts[0] ? state.fronts[0].id : null);
    }

    scheduleSave();
    render();
  }

  // ---------- RENDER ----------
  function render(){
    renderSidebar();
    renderMain();
  }

  function buildFrontItem(f, extraClass){
    const count = frontDemands(f.id).length;
    const progress = frontProgress(f.id);
    const auto = frontAutoStatus(f.id);

    const item = document.createElement('div');
    item.className = 'front-item' + (f.id === state.activeFrontId && state.viewTab === 'front' ? ' active' : '') + (extraClass ? ' ' + extraClass : '');

    const logoHtml = f.logo ? `<img class="item-logo-thumb" src="${f.logo}" />` : '';

    item.innerHTML = `
      <div class="front-item-top">
        <span class="front-status-dot ${f.status}" title="${FRONT_STATUS_LABEL[f.status]}"></span>
        ${logoHtml}
        <span class="front-name">${escapeHtml(f.name)}</span>
        <span class="front-count">${count}</span>
        <button class="front-menu-btn" title="Mais ações">⋮</button>
      </div>
      <div class="front-item-bottom">
        <div class="front-progress-track"><div class="front-progress-fill" style="width:${progress}%"></div></div>
        <span class="front-auto-dot ${auto}" title="Status automático"></span>
      </div>
      <div class="front-menu-dropdown" id="menu-${f.id}"></div>
    `;

    item.addEventListener('click', () => selectFront(f.id));

    const menuBtn = item.querySelector('.front-menu-btn');
    const dropdown = item.querySelector('.front-menu-dropdown');
    const inMoveMode = state.moveMenuFrontId === f.id;
    dropdown.innerHTML = inMoveMode ? buildMoveMenuItems(f) : buildMenuItems(f);

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = state.openMenuId === f.id;
      state.openMenuId = isOpen ? null : f.id;
      if(!state.openMenuId) state.moveMenuFrontId = null;
      render();
    });
    dropdown.className = 'front-menu-dropdown' + (state.openMenuId === f.id ? ' open' : '');
    dropdown.addEventListener('click', (e) => e.stopPropagation());

    if(inMoveMode){
      const backBtn = dropdown.querySelector('[data-action="back"]');
      if(backBtn) backBtn.addEventListener('click', () => { state.moveMenuFrontId = null; render(); });
      dropdown.querySelectorAll('[data-move]').forEach(btn => {
        btn.addEventListener('click', () => {
          const val = btn.dataset.move;
          moveFrontToFolder(f, val === 'none' ? null : val);
          state.moveMenuFrontId = null;
          state.openMenuId = null;
        });
      });
    } else {
      dropdown.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
          const action = btn.dataset.action;
          if(action === 'move'){
            state.moveMenuFrontId = f.id;
            render();
            return;
          }
          state.openMenuId = null;
          if(action === 'rename') renameFront(f);
          else if(action === 'logo') triggerLogoUpload('front', f.id);
          else if(action === 'removelogo') removeLogo('front', f.id);
          else if(action === 'pause') togglePauseFront(f);
          else if(action === 'archive') archiveFront(f);
          else if(action === 'restore') restoreFront(f);
          else if(action === 'delete') deleteFrontForever(f);
        });
      });
    }

    return item;
  }

  function buildMenuItems(f){
    let html = `<button class="front-menu-item" data-action="rename">✎ Renomear</button>`;
    html += `<button class="front-menu-item" data-action="logo">🖼 ${f.logo ? 'Alterar Logo' : 'Adicionar Logo'}</button>`;
    if(f.logo) html += `<button class="front-menu-item" data-action="removelogo">✕ Remover Logo</button>`;
    html += `<button class="front-menu-item" data-action="move">📁 Mover para pasta</button>`;
    if(f.status !== 'arquivada'){
      html += `<button class="front-menu-item" data-action="pause">${f.status === 'pausada' ? '▶ Reativar' : '⏸ Pausar'}</button>`;
      html += `<div class="front-menu-divider"></div>`;
      html += `<button class="front-menu-item" data-action="archive">🗄 Arquivar</button>`;
    } else {
      html += `<div class="front-menu-divider"></div>`;
      html += `<button class="front-menu-item" data-action="restore">↺ Restaurar</button>`;
    }
    html += `<button class="front-menu-item danger" data-action="delete">✕ Excluir definitivamente</button>`;
    return html;
  }

  function buildMoveMenuItems(f){
    let html = `<button class="front-menu-item" data-action="back">← Voltar</button><div class="front-menu-divider"></div>`;
    html += `<button class="front-menu-item" data-move="none">${!f.folderId ? '✓ ' : ''}Sem pasta</button>`;
    const activeFolders = state.folders.filter(fo => !fo.archived);
    if(activeFolders.length === 0){
      html += `<div class="front-menu-item" style="opacity:.5;cursor:default;">Nenhuma pasta criada ainda</div>`;
    } else {
      activeFolders.forEach(fo => {
        html += `<button class="front-menu-item" data-move="${fo.id}">${f.folderId === fo.id ? '✓ ' : ''}${escapeHtml(fo.name)}</button>`;
      });
    }
    return html;
  }

  function buildFolderMenuItems(fo){
    let html = `<button class="front-menu-item" data-action="rename">✎ Renomear</button>`;
    html += `<button class="front-menu-item" data-action="addsub">📁 + Subpasta</button>`;
    html += `<button class="front-menu-item" data-action="logo">🖼 ${fo.logo ? 'Alterar Logo' : 'Adicionar Logo'}</button>`;
    if(fo.logo) html += `<button class="front-menu-item" data-action="removelogo">✕ Remover Logo</button>`;
    if(!fo.archived){
      html += `<div class="front-menu-divider"></div>`;
      html += `<button class="front-menu-item" data-action="archive">🗄 Arquivar pasta</button>`;
    } else {
      html += `<div class="front-menu-divider"></div>`;
      html += `<button class="front-menu-item" data-action="restore">↺ Restaurar pasta</button>`;
    }
    html += `<button class="front-menu-item danger" data-action="delete">✕ Excluir pasta</button>`;
    return html;
  }

  function buildFolderGroup(fo){
    const wrap = document.createElement('div');
    wrap.className = 'folder-group';

    const childFolders = state.folders.filter(f => f.parentId === fo.id && !f.archived);
    const fronts = state.fronts.filter(f => f.folderId === fo.id && f.status !== 'arquivada');
    const collapsed = !!state.collapsedFolders[fo.id];

    const header = document.createElement('div');
    header.className = 'folder-header';

    const logoHtml = fo.logo 
      ? `<img class="item-logo-thumb" src="${fo.logo}" />` 
      : `<span class="folder-icon">📁</span>`;

    header.innerHTML = `
      <span class="folder-chevron${collapsed ? '' : ' open'}">▶</span>
      ${logoHtml}
      <span class="folder-name">${escapeHtml(fo.name)}</span>
      <span class="folder-count">${fronts.length}</span>
      <button class="folder-add-btn" title="Nova frente nesta pasta">+</button>
      <button class="folder-menu-btn" title="Mais ações">⋮</button>
      <div class="front-menu-dropdown" id="foldermenu-${fo.id}"></div>
    `;
    header.addEventListener('click', (e) => {
      if(e.target.closest('.folder-add-btn') || e.target.closest('.folder-menu-btn') || e.target.closest('.front-menu-dropdown')) return;
      state.collapsedFolders[fo.id] = !collapsed;
      render();
    });
    wrap.appendChild(header);

    const addBtn = header.querySelector('.folder-add-btn');
    addBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const nf = { id: uid(), name: 'Nova frente', createdAt: Date.now(), status: 'ativa', folderId: fo.id, logo: null };
      state.fronts.push(nf);
      state.activeFrontId = nf.id;
      state.activeFilter = 'all';
      state.viewTab = 'front';
      state.collapsedFolders[fo.id] = false;
      scheduleSave();
      render();
    });

    const menuBtn = header.querySelector('.folder-menu-btn');
    const dropdown = header.querySelector('.front-menu-dropdown');
    dropdown.innerHTML = buildFolderMenuItems(fo);
    dropdown.className = 'front-menu-dropdown' + (state.folderMenuOpenId === fo.id ? ' open' : '');
    dropdown.addEventListener('click', (e) => e.stopPropagation());

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      state.folderMenuOpenId = state.folderMenuOpenId === fo.id ? null : fo.id;
      render();
    });

    dropdown.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.folderMenuOpenId = null;
        const action = btn.dataset.action;
        if(action === 'rename') renameFolder(fo);
        else if(action === 'addsub') createFolder(fo.id);
        else if(action === 'logo') triggerLogoUpload('folder', fo.id);
        else if(action === 'removelogo') removeLogo('folder', fo.id);
        else if(action === 'archive') archiveFolder(fo);
        else if(action === 'restore') restoreFolder(fo);
        else if(action === 'delete') deleteFolderForever(fo);
      });
    });

    const childrenWrap = document.createElement('div');
    childrenWrap.className = 'folder-children' + (collapsed ? ' collapsed' : '');
    
    childFolders.forEach(sub => {
      childrenWrap.appendChild(buildFolderGroup(sub));
    });

    fronts.forEach(f => childrenWrap.appendChild(buildFrontItem(f)));

    if(childFolders.length === 0 && fronts.length === 0){
      const empty = document.createElement('div');
      empty.className = 'folder-empty';
      empty.textContent = 'Pasta vazia.';
      childrenWrap.appendChild(empty);
    }

    wrap.appendChild(childrenWrap);
    return wrap;
  }

  function buildArchivedFoldersSection(list){
    const archivedFolders = state.folders.filter(fo => fo.archived);

    const toggle = document.createElement('div');
    toggle.className = 'history-toggle' + (state.foldersArchivedOpen ? ' open' : '');
    toggle.innerHTML = `<span class="history-chevron">▶</span> Pastas arquivadas <span class="history-toggle-count">${archivedFolders.length}</span>`;
    toggle.addEventListener('click', () => {
      state.foldersArchivedOpen = !state.foldersArchivedOpen;
      render();
    });
    list.appendChild(toggle);

    const body = document.createElement('div');
    body.className = 'history-body' + (state.foldersArchivedOpen ? ' open' : '');

    if(state.foldersArchivedOpen){
      if(archivedFolders.length === 0){
        const empty = document.createElement('div');
        empty.className = 'history-empty';
        empty.textContent = 'Nenhuma pasta arquivada.';
        body.appendChild(empty);
      } else {
        archivedFolders.forEach(fo => {
          const block = document.createElement('div');
          block.className = 'archived-folder-block';
          const fronts = state.fronts.filter(f => f.folderId === fo.id);
          block.innerHTML = `
            <div class="archived-folder-head">
              📁 ${escapeHtml(fo.name)} <span class="folder-count">${fronts.length}</span>
              <div class="archived-folder-actions">
                <button data-action="restore">↺ Restaurar</button>
                <button data-action="delete">✕ Excluir</button>
              </div>
            </div>
          `;
          block.querySelector('[data-action="restore"]').addEventListener('click', () => restoreFolder(fo));
          block.querySelector('[data-action="delete"]').addEventListener('click', () => deleteFolderForever(fo));

          if(fronts.length){
            const frontsWrap = document.createElement('div');
            frontsWrap.className = 'folder-children';
            fronts.forEach(f => frontsWrap.appendChild(buildFrontItem(f, 'archived')));
            block.appendChild(frontsWrap);
          }
          body.appendChild(block);
        });
      }
    }

    list.appendChild(body);
  }

  function renderSidebar(){
    const list = document.getElementById('frontsList');
    list.innerHTML = '';

    const archivedFronts = state.fronts.filter(f => f.status === 'arquivada');
    const rootActiveFolders = state.folders.filter(fo => !fo.archived && !fo.parentId);
    const unfiledActive = state.fronts.filter(f => f.status !== 'arquivada' && !f.folderId);

    const activeLabel = document.createElement('div');
    activeLabel.className = 'fronts-section-label';
    activeLabel.textContent = 'Frentes ativas';
    list.appendChild(activeLabel);

    if(rootActiveFolders.length === 0 && unfiledActive.length === 0){
      const empty = document.createElement('div');
      empty.className = 'history-empty';
      empty.textContent = 'Nenhuma frente ativa.';
      list.appendChild(empty);
    } else {
      rootActiveFolders.forEach(fo => list.appendChild(buildFolderGroup(fo)));

      if(rootActiveFolders.length > 0){
        const unfiledLabel = document.createElement('div');
        unfiledLabel.className = 'unfiled-label';
        unfiledLabel.textContent = 'Sem pasta';
        list.appendChild(unfiledLabel);
      }

      if(unfiledActive.length === 0 && rootActiveFolders.length > 0){
        const empty = document.createElement('div');
        empty.className = 'history-empty';
        empty.textContent = 'Nenhuma frente fora de pasta.';
        list.appendChild(empty);
      } else {
        unfiledActive.forEach(f => list.appendChild(buildFrontItem(f)));
      }
    }

    buildArchivedFoldersSection(list);

    const historyToggle = document.createElement('div');
    historyToggle.className = 'history-toggle' + (state.historyOpen ? ' open' : '');
    historyToggle.innerHTML = `<span class="history-chevron">▶</span> Histórico <span class="history-toggle-count">${archivedFronts.length}</span>`;
    historyToggle.addEventListener('click', () => {
      state.historyOpen = !state.historyOpen;
      render();
    });
    list.appendChild(historyToggle);

    const historyBody = document.createElement('div');
    historyBody.className = 'history-body' + (state.historyOpen ? ' open' : '');

    if(state.historyOpen){
      const searchWrap = document.createElement('div');
      searchWrap.className = 'history-search';
      searchWrap.innerHTML = `<input type="text" id="historySearchInput" placeholder="Buscar no histórico…" />`;
      historyBody.appendChild(searchWrap);

      const term = state.historySearch.trim().toLowerCase();
      const filtered = term
        ? archivedFronts.filter(f => f.name.toLowerCase().includes(term))
        : archivedFronts;

      if(filtered.length === 0){
        const empty = document.createElement('div');
        empty.className = 'history-empty';
        empty.textContent = archivedFronts.length === 0 ? 'Nenhuma frente arquivada.' : 'Nada encontrado.';
        historyBody.appendChild(empty);
      } else {
        filtered.forEach(f => historyBody.appendChild(buildFrontItem(f, 'archived')));
      }
    }

    list.appendChild(historyBody);

    if(state.historyOpen){
      const input = document.getElementById('historySearchInput');
      if(input){
        input.value = state.historySearch;
        input.addEventListener('input', () => {
          state.historySearch = input.value;
          render();
          const el = document.getElementById('historySearchInput');
          if(el){
            el.focus();
            el.selectionStart = el.selectionEnd = el.value.length;
          }
        });
      }
    }

    const totalDemands = state.demands.length;
    document.getElementById('totalMeta').textContent =
      `${state.fronts.length} frente${state.fronts.length===1?'':'s'} · ${totalDemands} demanda${totalDemands===1?'':'s'}`;
  }

  function renderFocusBanner(){
    if(!state.activeDemandId) return '';

    const activeDemand = state.demands.find(d => d.id === state.activeDemandId);
    if(!activeDemand){
      state.activeDemandId = null;
      return '';
    }

    const breadcrumb = getBreadcrumbPath(activeDemand.frontId);

    return `
      <div class="focus-banner">
        <div class="focus-info">
          <div class="focus-tag">⚡ Em Atividade Agora</div>
          <div class="focus-title">${escapeHtml(activeDemand.title)}</div>
          <div class="focus-breadcrumb">📍 ${escapeHtml(breadcrumb)}</div>
        </div>
        <div class="focus-right">
          <div class="focus-timer" id="focusTimerDisplay">00:00:00</div>
          <button class="focus-done-btn" id="focusDoneBtn">✓ Concluir</button>
          <button class="focus-clear-btn" id="focusClearBtn">Soltar</button>
        </div>
      </div>
    `;
  }

  function bindFocusBannerEvents(){
    const doneBtn = document.getElementById('focusDoneBtn');
    if(doneBtn){
      doneBtn.addEventListener('click', () => {
        const activeDemand = state.demands.find(d => d.id === state.activeDemandId);
        if(activeDemand){
          activeDemand.status = 'finalizado';
        }
        logActiveDemandTime();
        scheduleSave();
        render();
      });
    }

    const clearBtn = document.getElementById('focusClearBtn');
    if(clearBtn){
      clearBtn.addEventListener('click', () => {
        logActiveDemandTime();
        scheduleSave();
        render();
      });
    }
  }

  function renderMain(){
    const main = document.getElementById('main');
    
    // Navegação de Abas
    let html = `
      <div class="main-nav">
        <button class="nav-tab ${state.viewTab === 'front' ? 'active' : ''}" id="tabFront">📋 Quadro da Frente</button>
        <button class="nav-tab ${state.viewTab === 'global' ? 'active' : ''}" id="tabGlobal">📊 Visão Geral Abertas</button>
        <button class="nav-tab ${state.viewTab === 'history' ? 'active' : ''}" id="tabHistory">⏱️ Histórico & Tempos</button>
      </div>
    `;

    // Banner "Em Atividade"
    html += renderFocusBanner();

    if(state.viewTab === 'global'){
      html += renderGlobalViewHtml();
      main.innerHTML = html;
      bindFocusBannerEvents();
      bindGlobalNavEvents();
    } else if(state.viewTab === 'history'){
      html += renderHistoryViewHtml();
      main.innerHTML = html;
      bindFocusBannerEvents();
      bindGlobalNavEvents();

      const clearLogsBtn = document.getElementById('clearLogsBtn');
      if(clearLogsBtn){
        clearLogsBtn.addEventListener('click', () => {
          if(confirm('Tem certeza que deseja apagar todo o histórico de registros de tempo?')){
            state.timeLogs = [];
            scheduleSave();
            render();
          }
        });
      }
    } else {
      const front = state.fronts.find(f => f.id === state.activeFrontId);

      if(!front){
        html += `<div class="empty-state"><h3>Nenhuma frente selecionada</h3><p>Crie ou escolha uma frente na lateral para começar.</p></div>`;
        main.innerHTML = html;
        bindFocusBannerEvents();
        bindGlobalNavEvents();
        return;
      }

      const all = frontDemands(front.id);
      const counts = { all: all.length };
      STATUS.forEach(s => counts[s] = all.filter(d => d.status === s).length);
      const progress = frontProgress(front.id);
      const logoHtml = front.logo ? `<img class="main-front-logo" src="${front.logo}" />` : '';

      html += `
        <div class="main-head">
          <div>
            <div class="front-title-row">
              ${logoHtml}
              <div class="front-title" contenteditable="true" id="frontTitle" spellcheck="false">${escapeHtml(front.name)}</div>
              <span class="front-status-pill ${front.status}"><span class="dot"></span>${FRONT_STATUS_LABEL[front.status]}</span>
            </div>
            <div class="front-meta">
              <span>${all.length} demanda${all.length===1?'':'s'} nesta frente</span>
              <span class="front-meta-progress"><span class="track"><span class="fill" style="width:${progress}%"></span></span>${progress}%</span>
            </div>
          </div>
          <div class="head-actions">
            ${front.status === 'arquivada' ? `<button class="restore-inline-btn" id="restoreInlineBtn">↺ Restaurar frente</button>` : ''}
            <button class="new-demand-btn" id="newDemandBtn">+ Nova demanda</button>
          </div>
        </div>
        <div class="filters" id="filters"></div>
        <div class="board" id="board"></div>
      `;

      main.innerHTML = html;
      bindFocusBannerEvents();
      bindGlobalNavEvents();

      const titleEl = document.getElementById('frontTitle');
      if(titleEl){
        titleEl.addEventListener('blur', () => {
          const val = titleEl.textContent.trim() || 'Sem nome';
          front.name = val;
          scheduleSave();
          renderSidebar();
        });
        titleEl.addEventListener('keydown', e => {
          if(e.key === 'Enter'){ e.preventDefault(); titleEl.blur(); }
        });
      }

      const restoreBtn = document.getElementById('restoreInlineBtn');
      if(restoreBtn){
        restoreBtn.addEventListener('click', () => restoreFront(front));
      }

      document.getElementById('newDemandBtn').addEventListener('click', () => {
        const d = {
          id: uid(),
          frontId: front.id,
          title: 'Nova demanda',
          note: '',
          status: 'aberto',
          createdAt: Date.now()
        };
        state.demands.unshift(d);
        scheduleSave();
        render();
      });

      // Filtros
      const filtersEl = document.getElementById('filters');
      const chips = [
        { key: 'all', label: 'Todas', n: counts.all },
        { key: 'aberto', label: 'Aberto', n: counts.aberto },
        { key: 'andamento', label: 'Em andamento', n: counts.andamento },
        { key: 'finalizado', label: 'Finalizado', n: counts.finalizado },
      ];
      chips.forEach(c => {
        const chip = document.createElement('div');
        chip.className = 'filter-chip' + (state.activeFilter === c.key ? ' active' : '');
        chip.innerHTML = `${c.label} <span class="n">${c.n}</span>`;
        chip.addEventListener('click', () => { state.activeFilter = c.key; render(); });
        filtersEl.appendChild(chip);
      });

      // Quadros
      const board = document.getElementById('board');
      STATUS.forEach(statusKey => {
        const items = all.filter(d => d.status === statusKey);
        const visibleItems = state.activeFilter === 'all' || state.activeFilter === statusKey ? items : [];

        const col = document.createElement('div');
        col.className = 'column';
        col.innerHTML = `
          <div class="column-head">
            <span class="col-dot ${statusKey}"></span>
            ${STATUS_LABEL[statusKey]}
            <span class="column-count">${items.length}</span>
          </div>
          <div class="cards" id="cards-${statusKey}"></div>
        `;
        board.appendChild(col);

        const cardsEl = col.querySelector('.cards');
        if(visibleItems.length === 0){
          const empty = document.createElement('div');
          empty.className = 'empty-col';
          empty.textContent = state.activeFilter === 'all' || state.activeFilter === statusKey ? 'Nada por aqui' : '';
          if(empty.textContent) cardsEl.appendChild(empty);
        } else {
          visibleItems.forEach(d => cardsEl.appendChild(renderCard(d, false)));
        }
      });
    }
  }

  function bindGlobalNavEvents(){
    const tabFront = document.getElementById('tabFront');
    const tabGlobal = document.getElementById('tabGlobal');
    const tabHistory = document.getElementById('tabHistory');

    if(tabFront) tabFront.addEventListener('click', () => { state.viewTab = 'front'; render(); });
    if(tabGlobal) tabGlobal.addEventListener('click', () => { state.viewTab = 'global'; render(); });
    if(tabHistory) tabHistory.addEventListener('click', () => { state.viewTab = 'history'; render(); });
  }

  // RENDER VISÃO GERAL DE DEMANDAS ABERTAS
  function renderGlobalViewHtml(){
    const openDemands = state.demands.filter(d => d.status !== 'finalizado');

    let html = `
      <div class="main-head">
        <div>
          <h2 style="font-family:'Space Grotesk', sans-serif; font-size:22px;">📊 Visão Geral de Demandas Pendentes</h2>
          <p style="color:var(--text-faint); font-size:12.5px; margin-top:4px;">Todas as tarefas abertas e em andamento de todas as frentes e pastas.</p>
        </div>
      </div>
      <div class="overview-grid" id="overviewGrid"></div>
    `;

    setTimeout(() => {
      const grid = document.getElementById('overviewGrid');
      if(!grid) return;

      if(openDemands.length === 0){
        grid.innerHTML = `<div class="empty-state"><h3>Tudo em dia! 🎉</h3><p>Não há nenhuma demanda pendente em nenhuma frente.</p></div>`;
      } else {
        openDemands.forEach(d => {
          grid.appendChild(renderCard(d, true));
        });
      }
    }, 0);

    return html;
  }

  // RENDER HISTÓRICO DE TEMPOS DIÁRIOS
  function renderHistoryViewHtml(){
    let html = `
      <div class="main-head">
        <div>
          <h2 style="font-family:'Space Grotesk', sans-serif; font-size:22px;">⏱️ Histórico de Atividades & Tempos</h2>
          <p style="color:var(--text-faint); font-size:12.5px; margin-top:4px;">Registro automático do tempo dedicado em cada demanda agrupado por dia.</p>
        </div>
        <button class="restore-inline-btn" id="clearLogsBtn">🗑 Limpar Registros</button>
      </div>
      <div class="time-logs-container" id="timeLogsContainer"></div>
    `;

    setTimeout(() => {
      const container = document.getElementById('timeLogsContainer');
      if(!container) return;

      if(state.timeLogs.length === 0){
        container.innerHTML = `<div class="empty-state"><h3>Nenhum tempo registrado ainda ⏱️</h3><p>Clique em <b>🎯 Focar</b> em qualquer demanda para começar a cronometrar.</p></div>`;
        return;
      }

      // Agrupa os logs por data (dateKey)
      const grouped = {};
      state.timeLogs.forEach(log => {
        if(!grouped[log.dateKey]) grouped[log.dateKey] = [];
        grouped[log.dateKey].push(log);
      });

      // Ordena por data decrescente
      const sortedDates = Object.keys(grouped).sort().reverse();

      sortedDates.forEach(dateKey => {
        const logs = grouped[dateKey];
        const dayTotalSec = logs.reduce((acc, curr) => acc + curr.durationSec, 0);

        // Formata data bonita (ex: 22/07/2026)
        const [year, month, day] = dateKey.split('-');
        const formattedDateStr = `${day}/${month}/${year}`;

        const dayCard = document.createElement('div');
        dayCard.className = 'day-log-card';

        let itemsHtml = '';
        logs.forEach(l => {
          const startTimeStr = new Date(l.startTime).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
          const endTimeStr = new Date(l.endTime).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });

          itemsHtml += `
            <div class="log-item-row">
              <div class="log-item-main">
                <div class="log-item-task">${escapeHtml(l.demandTitle)}</div>
                <div class="log-item-path">📍 ${escapeHtml(l.breadcrumb || 'Sem caminho')}</div>
              </div>
              <div class="log-item-meta">
                <span class="log-item-time">${startTimeStr} - ${endTimeStr}</span>
                <span class="log-item-duration">⏱️ ${formatSeconds(l.durationSec)}</span>
              </div>
            </div>
          `;
        });

        dayCard.innerHTML = `
          <div class="day-log-header">
            <div class="day-log-title">📅 ${formattedDateStr}</div>
            <div class="day-log-total">Tempo Total: ${formatSeconds(dayTotalSec)}</div>
          </div>
          <div class="log-items-list">${itemsHtml}</div>
        `;

        container.appendChild(dayCard);
      });
    }, 0);

    return html;
  }

  function renderCard(d, showBreadcrumb){
    const card = document.createElement('div');
    const isFocused = state.activeDemandId === d.id;
    card.className = 'card' + (isFocused ? ' is-active-focus' : '');
    const date = new Date(d.createdAt);
    const dateStr = date.toLocaleDateString('pt-BR', { day:'2-digit', month:'short' });

    const breadcrumbHtml = showBreadcrumb 
      ? `<div class="card-breadcrumb-path">📍 ${escapeHtml(getBreadcrumbPath(d.frontId))}</div>` 
      : '';

    card.innerHTML = `
      <div class="card-top">
        <div class="card-title" contenteditable="true" spellcheck="false">${escapeHtml(d.title)}</div>
        <div class="card-actions">
          <button class="icon-btn delete-btn" title="Excluir">✕</button>
        </div>
      </div>
      ${breadcrumbHtml}
      <div class="card-middle">
        <div class="stamp ${d.status}"><span class="dot"></span>${STATUS_LABEL[d.status]}</div>
        <button class="focus-trigger-btn ${isFocused ? 'active' : ''}">${isFocused ? '⚡ Em Foco' : '🎯 Focar'}</button>
      </div>
      <textarea class="note-area" placeholder="Anotação…">${escapeHtml(d.note || '')}</textarea>
      <div class="card-date">criado em ${dateStr}</div>
    `;

    const titleEl = card.querySelector('.card-title');
    titleEl.addEventListener('blur', () => {
      d.title = titleEl.textContent.trim() || 'Sem título';
      scheduleSave();
    });
    titleEl.addEventListener('keydown', e => {
      if(e.key === 'Enter'){ e.preventDefault(); titleEl.blur(); }
    });

    const noteEl = card.querySelector('.note-area');
    noteEl.addEventListener('input', () => {
      noteEl.style.height = 'auto';
      noteEl.style.height = noteEl.scrollHeight + 'px';
    });
    noteEl.addEventListener('blur', () => {
      d.note = noteEl.value;
      scheduleSave();
    });
    requestAnimationFrame(() => {
      noteEl.style.height = 'auto';
      noteEl.style.height = noteEl.scrollHeight + 'px';
    });

    const stamp = card.querySelector('.stamp');
    stamp.addEventListener('click', () => {
      const idx = STATUS.indexOf(d.status);
      d.status = STATUS[(idx + 1) % STATUS.length];
      scheduleSave();
      render();
    });

    const focusBtn = card.querySelector('.focus-trigger-btn');
    focusBtn.addEventListener('click', () => {
      setFocusDemand(d.id);
    });

    const deleteBtn = card.querySelector('.delete-btn');
    let confirmState = false;
    deleteBtn.addEventListener('click', () => {
      if(!confirmState){
        confirmState = true;
        deleteBtn.textContent = '✕ confirmar';
        deleteBtn.classList.add('delete-confirm');
        setTimeout(() => {
          if(confirmState){
            confirmState = false;
            deleteBtn.textContent = '✕';
            deleteBtn.classList.remove('delete-confirm');
          }
        }, 3000);
      } else {
        if(state.activeDemandId === d.id) state.activeDemandId = null;
        state.demands = state.demands.filter(x => x.id !== d.id);
        scheduleSave();
        render();
      }
    });

    return card;
  }

  document.getElementById('addFrontBtn').addEventListener('click', () => {
    const f = { id: uid(), name: 'Nova frente', createdAt: Date.now(), status: 'ativa', folderId: null, logo: null };
    state.fronts.push(f);
    state.activeFrontId = f.id;
    state.activeFilter = 'all';
    state.viewTab = 'front';
    scheduleSave();
    render();
  });

  document.addEventListener('click', () => {
    if(state.openMenuId !== null || state.folderMenuOpenId !== null){
      state.openMenuId = null;
      state.moveMenuFrontId = null;
      state.folderMenuOpenId = null;
      render();
    }
  });

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  loadData();
})();
</script>
</body>
</html>
