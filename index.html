<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Frentes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12141b;
    --bg-soft: #171a23;
    --panel: #1c202b;
    --panel-hover: #21252f;
    --border: #2a2f3c;
    --border-soft: #23273233;
    --text: #eef0f5;
    --text-dim: #9198a8;
    --text-faint: #5c6272;
    --accent: #d4a154;
    --accent-soft: #d4a15422;
    --aberto: #6d8ce8;
    --aberto-soft: #6d8ce81c;
    --andamento: #e0a940;
    --andamento-soft: #e0a9401c;
    --finalizado: #4fb98a;
    --finalizado-soft: #4fb98a1c;
    --danger: #e2574c;
    --danger-soft: #e2574c1c;
    --radius: 14px;
    --radius-sm: 9px;
    font-family: 'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(circle at 15% -10%, #23283a55, transparent 45%),
      radial-gradient(circle at 90% 0%, #2a2f3c44, transparent 40%),
      var(--bg);
    color: var(--text);
    min-height:100vh;
    display:flex;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width: 264px;
    flex-shrink:0;
    background: var(--bg-soft);
    border-right: 1px solid var(--border);
    display:flex;
    flex-direction:column;
    height:100vh;
    position:sticky;
    top:0;
  }
  .sidebar-head{
    padding: 22px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .brand{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size: 17px;
    letter-spacing: -0.01em;
    display:flex;
    align-items:center;
    gap:9px;
  }
  .brand-dot{
    width:9px;height:9px;border-radius:50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .brand-sub{
    margin-top:4px;
    font-size: 11.5px;
    color: var(--text-faint);
    font-family:'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
  }

  .fronts-list{
    flex:1;
    overflow-y:auto;
    padding: 14px 10px;
    display:flex;
    flex-direction:column;
    gap: 3px;
  }
  .front-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor:pointer;
    color: var(--text-dim);
    transition: background .15s ease, color .15s ease;
    border: 1px solid transparent;
  }
  .front-item:hover{ background: var(--panel-hover); color: var(--text); }
  .front-item.active{
    background: var(--accent-soft);
    color: var(--text);
    border-color: #d4a15433;
  }
  .front-name{
    font-size: 13.5px;
    font-weight: 500;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .front-count{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    background: #ffffff08;
    padding: 1px 7px;
    border-radius: 20px;
    flex-shrink:0;
  }
  .front-item.active .front-count{ color: var(--accent); background: #d4a15422; }

  .add-front-btn{
    margin: 6px 10px 14px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--text-faint);
    font-size: 13px;
    font-family: inherit;
    cursor:pointer;
    text-align:left;
    transition: all .15s ease;
  }
  .add-front-btn:hover{
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }

  .sidebar-foot{
    padding: 14px 20px 18px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-faint);
    font-family:'JetBrains Mono', monospace;
    display:flex;
    align-items:center;
    gap:7px;
  }
  .sync-dot{
    width:6px;height:6px;border-radius:50%;
    background: var(--finalizado);
    flex-shrink:0;
    transition: background .2s ease;
  }
  .sync-dot.saving{ background: var(--andamento); animation: pulse 1s infinite ease-in-out; }
  .sync-dot.error{ background: var(--danger); }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.35} }
  .sync-retry{
    margin-left:auto;
    background:none;border:none;color:var(--danger);
    font-family:inherit; font-size:11px; cursor:pointer;
    text-decoration:underline;
    display:none;
  }
  .sync-retry.show{ display:inline; }

  /* ---------- MAIN ---------- */
  .main{
    flex:1;
    min-width:0;
    padding: 30px 40px 60px;
    max-width: 1400px;
  }
  .main-head{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    margin-bottom: 22px;
    gap: 20px;
    flex-wrap:wrap;
  }
  .front-title{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size: 26px;
    letter-spacing:-0.01em;
    outline:none;
    border-radius:6px;
    padding: 2px 6px;
    margin-left:-6px;
    cursor:text;
  }
  .front-title:hover, .front-title:focus{ background: var(--panel-hover); }
  .front-meta{
    font-family:'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--text-faint);
    margin-top:5px;
  }

  .new-demand-btn{
    background: var(--accent);
    color: #1a1508;
    border:none;
    font-weight:600;
    font-size: 13.5px;
    padding: 10px 18px;
    border-radius: 10px;
    cursor:pointer;
    font-family: inherit;
    box-shadow: 0 1px 0 #ffffff22 inset, 0 6px 16px -6px #d4a15477;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .new-demand-btn:hover{ transform: translateY(-1px); box-shadow: 0 1px 0 #ffffff22 inset, 0 10px 20px -6px #d4a15499; }
  .new-demand-btn:active{ transform: translateY(0); }

  .filters{
    display:flex;
    gap:8px;
    margin-bottom: 24px;
    flex-wrap:wrap;
  }
  .filter-chip{
    padding: 7px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text-dim);
    font-size: 12.5px;
    font-weight:500;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:7px;
    transition: all .15s ease;
  }
  .filter-chip:hover{ border-color: var(--text-faint); color: var(--text); }
  .filter-chip.active{
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .filter-chip .n{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    opacity: .65;
  }

  .board{
    display:grid;
    grid-template-columns: repeat(3, minmax(0,1fr));
    gap: 18px;
  }
  @media (max-width: 980px){ .board{ grid-template-columns: 1fr; } }

  .column{
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    min-height: 120px;
  }
  .column-head{
    display:flex;
    align-items:center;
    gap:9px;
    padding: 4px 4px 14px;
    font-weight:600;
    font-size: 13px;
  }
  .col-dot{ width:8px; height:8px; border-radius:50%; }
  .col-dot.aberto{ background: var(--aberto); }
  .col-dot.andamento{ background: var(--andamento); }
  .col-dot.finalizado{ background: var(--finalizado); }
  .column-count{
    margin-left:auto;
    font-family:'JetBrains Mono', monospace;
    color: var(--text-faint);
    font-size: 11.5px;
  }

  .cards{ display:flex; flex-direction:column; gap:10px; }

  .empty-col{
    color: var(--text-faint);
    font-size: 12.5px;
    text-align:center;
    padding: 26px 10px;
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
  }

  .card{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 14px 12px;
    transition: border-color .15s ease, transform .1s ease;
  }
  .card:hover{ border-color: #3a4052; }
  .card-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap: 8px;
  }
  .card-title{
    font-size: 14px;
    font-weight: 600;
    line-height:1.35;
    outline:none;
    flex:1;
    cursor:text;
    border-radius:5px;
    padding: 1px 4px;
    margin-left:-4px;
  }
  .card-title:hover, .card-title:focus{ background: var(--panel-hover); }

  .card-actions{ display:flex; gap:4px; flex-shrink:0; }
  .icon-btn{
    width: 24px; height:24px;
    display:flex; align-items:center; justify-content:center;
    background:none; border:none; cursor:pointer;
    color: var(--text-faint);
    border-radius: 6px;
    transition: all .12s ease;
  }
  .icon-btn:hover{ background: #ffffff0f; color: var(--text); }
  .icon-btn.delete-confirm{ color: var(--danger); background: var(--danger-soft); }

  .stamp{
    margin-top: 10px;
    display:inline-flex;
    align-items:center;
    gap: 6px;
    padding: 4px 10px 4px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    font-family:'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
    cursor:pointer;
    border: 1px solid transparent;
    user-select:none;
    transition: transform .1s ease;
  }
  .stamp:active{ transform: scale(.96); }
  .stamp .dot{ width:6px; height:6px; border-radius:50%; }
  .stamp.aberto{ background: var(--aberto-soft); color: var(--aberto); }
  .stamp.aberto .dot{ background: var(--aberto); }
  .stamp.andamento{ background: var(--andamento-soft); color: var(--andamento); }
  .stamp.andamento .dot{ background: var(--andamento); }
  .stamp.finalizado{ background: var(--finalizado-soft); color: var(--finalizado); }
  .stamp.finalizado .dot{ background: var(--finalizado); }

  .note-area{
    width:100%;
    margin-top: 10px;
    background: var(--bg-soft);
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 12.5px;
    line-height:1.5;
    padding: 8px 10px;
    resize: none;
    min-height: 40px;
    outline:none;
    transition: border-color .15s ease;
  }
  .note-area::placeholder{ color: var(--text-faint); }
  .note-area:focus{ border-color: var(--accent); color: var(--text); }

  .card-date{
    margin-top: 9px;
    font-size: 10.5px;
    color: var(--text-faint);
    font-family:'JetBrains Mono', monospace;
  }

  .empty-state{
    text-align:center;
    padding: 60px 20px;
    color: var(--text-faint);
  }
  .empty-state h3{
    font-family:'Space Grotesk', sans-serif;
    color: var(--text-dim);
    font-size: 16px;
    margin-bottom: 6px;
  }

  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:#33384700; }
  .fronts-list::-webkit-scrollbar-thumb{ background:#33384766; border-radius:8px; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-head">
    <div class="brand"><span class="brand-dot"></span>Central de Frentes</div>
    <div class="brand-sub" id="totalMeta">carregando…</div>
  </div>
  <div class="fronts-list" id="frontsList"></div>
  <button class="add-front-btn" id="addFrontBtn">+ Nova frente</button>
  <div class="sidebar-foot">
    <span class="sync-dot" id="syncDot"></span>
    <span id="syncLabel">sincronizado</span>
    <button class="sync-retry" id="syncRetryBtn">tentar de novo</button>
  </div>
</aside>

<main class="main" id="main">
  <!-- preenchido via JS -->
</main>

<script>
(function(){
  const STORAGE_KEY = 'central-frentes-data';
  const STATUS = ['aberto','andamento','finalizado'];
  const STATUS_LABEL = { aberto:'Aberto', andamento:'Em andamento', finalizado:'Finalizado' };

  let state = {
    fronts: [],
    demands: [],
    activeFrontId: null,
    activeFilter: 'all'
  };

  let saveTimer = null;
  let pendingSave = false;
  let retryCount = 0;

  const uid = () => Math.random().toString(36).slice(2, 10);

  // ---------- STORAGE ----------
  async function loadData(){
    setSyncStatus('saving', 'carregando…');
    try{
      const res = await window.storage.get(STORAGE_KEY, false);
      if(res && res.value){
        const parsed = JSON.parse(res.value);
        state.fronts = parsed.fronts || [];
        state.demands = parsed.demands || [];
      }
    }catch(e){
      // chave pode não existir ainda — tudo bem, começamos vazio
    }

    if(state.fronts.length === 0){
      const f1 = { id: uid(), name: 'Minha primeira frente', createdAt: Date.now() };
      state.fronts = [f1];
      state.activeFrontId = f1.id;
      await persist(true);
    } else {
      state.activeFrontId = state.fronts[0].id;
    }
    setSyncStatus('ok', 'sincronizado');
    render();
  }

  function scheduleSave(){
    pendingSave = true;
    setSyncStatus('saving', 'salvando…');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => persist(false), 500);
  }

  async function persist(immediate, attempt){
    attempt = attempt || 0;
    const payload = JSON.stringify({ fronts: state.fronts, demands: state.demands });
    try{
      const result = await window.storage.set(STORAGE_KEY, payload, false);
      if(!result) throw new Error('resultado vazio');
      pendingSave = false;
      retryCount = 0;
      setSyncStatus('ok', 'sincronizado');
    }catch(err){
      if(attempt < 3){
        const delay = 600 * Math.pow(2, attempt);
        setSyncStatus('saving', 'reconectando…');
        setTimeout(() => persist(immediate, attempt + 1), delay);
      } else {
        retryCount++;
        setSyncStatus('error', 'falha ao salvar');
      }
    }
  }

  function setSyncStatus(kind, label){
    const dot = document.getElementById('syncDot');
    const lbl = document.getElementById('syncLabel');
    const retryBtn = document.getElementById('syncRetryBtn');
    dot.className = 'sync-dot' + (kind === 'saving' ? ' saving' : kind === 'error' ? ' error' : '');
    lbl.textContent = label;
    retryBtn.className = 'sync-retry' + (kind === 'error' ? ' show' : '');
  }

  document.getElementById('syncRetryBtn').addEventListener('click', () => persist(true));

  // ---------- DERIVED ----------
  function frontDemands(frontId){
    return state.demands.filter(d => d.frontId === frontId);
  }

  // ---------- RENDER ----------
  function render(){
    renderSidebar();
    renderMain();
  }

  function renderSidebar(){
    const list = document.getElementById('frontsList');
    list.innerHTML = '';
    state.fronts.forEach(f => {
      const count = frontDemands(f.id).length;
      const item = document.createElement('div');
      item.className = 'front-item' + (f.id === state.activeFrontId ? ' active' : '');
      item.innerHTML = `<span class="front-name">${escapeHtml(f.name)}</span><span class="front-count">${count}</span>`;
      item.addEventListener('click', () => {
        state.activeFrontId = f.id;
        state.activeFilter = 'all';
        render();
      });
      list.appendChild(item);
    });
    const totalDemands = state.demands.length;
    document.getElementById('totalMeta').textContent =
      `${state.fronts.length} frente${state.fronts.length===1?'':'s'} · ${totalDemands} demanda${totalDemands===1?'':'s'}`;
  }

  function renderMain(){
    const main = document.getElementById('main');
    const front = state.fronts.find(f => f.id === state.activeFrontId);

    if(!front){
      main.innerHTML = `<div class="empty-state"><h3>Nenhuma frente ainda</h3><p>Crie uma frente na lateral para começar.</p></div>`;
      return;
    }

    const all = frontDemands(front.id);
    const counts = { all: all.length };
    STATUS.forEach(s => counts[s] = all.filter(d => d.status === s).length);

    main.innerHTML = `
      <div class="main-head">
        <div>
          <div class="front-title" contenteditable="true" id="frontTitle" spellcheck="false">${escapeHtml(front.name)}</div>
          <div class="front-meta">${all.length} demanda${all.length===1?'':'s'} nesta frente</div>
        </div>
        <button class="new-demand-btn" id="newDemandBtn">+ Nova demanda</button>
      </div>
      <div class="filters" id="filters"></div>
      <div class="board" id="board"></div>
    `;

    // front title edit
    const titleEl = document.getElementById('frontTitle');
    titleEl.addEventListener('blur', () => {
      const val = titleEl.textContent.trim() || 'Sem nome';
      front.name = val;
      scheduleSave();
      renderSidebar();
    });
    titleEl.addEventListener('keydown', e => {
      if(e.key === 'Enter'){ e.preventDefault(); titleEl.blur(); }
    });

    document.getElementById('newDemandBtn').addEventListener('click', () => {
      const d = {
        id: uid(),
        frontId: front.id,
        title: 'Nova demanda',
        note: '',
        status: 'aberto',
        createdAt: Date.now()
      };
      state.demands.unshift(d);
      scheduleSave();
      render();
    });

    // filters
    const filtersEl = document.getElementById('filters');
    const chips = [
      { key: 'all', label: 'Todas', n: counts.all },
      { key: 'aberto', label: 'Aberto', n: counts.aberto },
      { key: 'andamento', label: 'Em andamento', n: counts.andamento },
      { key: 'finalizado', label: 'Finalizado', n: counts.finalizado },
    ];
    chips.forEach(c => {
      const chip = document.createElement('div');
      chip.className = 'filter-chip' + (state.activeFilter === c.key ? ' active' : '');
      chip.innerHTML = `${c.label} <span class="n">${c.n}</span>`;
      chip.addEventListener('click', () => { state.activeFilter = c.key; render(); });
      filtersEl.appendChild(chip);
    });

    // board columns
    const board = document.getElementById('board');
    STATUS.forEach(statusKey => {
      const items = all.filter(d => d.status === statusKey);
      if(state.activeFilter !== 'all' && state.activeFilter !== statusKey){
        // still show column but empty, OR skip entirely when filtering — we show all 3 columns but filter items within
      }
      const visibleItems = state.activeFilter === 'all' || state.activeFilter === statusKey ? items : [];

      const col = document.createElement('div');
      col.className = 'column';
      col.innerHTML = `
        <div class="column-head">
          <span class="col-dot ${statusKey}"></span>
          ${STATUS_LABEL[statusKey]}
          <span class="column-count">${items.length}</span>
        </div>
        <div class="cards" id="cards-${statusKey}"></div>
      `;
      board.appendChild(col);

      const cardsEl = col.querySelector('.cards');
      if(visibleItems.length === 0){
        const empty = document.createElement('div');
        empty.className = 'empty-col';
        empty.textContent = state.activeFilter === 'all' || state.activeFilter === statusKey
          ? 'Nada por aqui'
          : '';
        if(empty.textContent) cardsEl.appendChild(empty);
      } else {
        visibleItems.forEach(d => cardsEl.appendChild(renderCard(d)));
      }
    });
  }

  function renderCard(d){
    const card = document.createElement('div');
    card.className = 'card';
    const date = new Date(d.createdAt);
    const dateStr = date.toLocaleDateString('pt-BR', { day:'2-digit', month:'short' });

    card.innerHTML = `
      <div class="card-top">
        <div class="card-title" contenteditable="true" spellcheck="false">${escapeHtml(d.title)}</div>
        <div class="card-actions">
          <button class="icon-btn delete-btn" title="Excluir">✕</button>
        </div>
      </div>
      <div class="stamp ${d.status}"><span class="dot"></span>${STATUS_LABEL[d.status]}</div>
      <textarea class="note-area" placeholder="Anotação…">${escapeHtml(d.note || '')}</textarea>
      <div class="card-date">criado em ${dateStr}</div>
    `;

    const titleEl = card.querySelector('.card-title');
    titleEl.addEventListener('blur', () => {
      d.title = titleEl.textContent.trim() || 'Sem título';
      scheduleSave();
    });
    titleEl.addEventListener('keydown', e => {
      if(e.key === 'Enter'){ e.preventDefault(); titleEl.blur(); }
    });

    const noteEl = card.querySelector('.note-area');
    noteEl.addEventListener('input', () => {
      noteEl.style.height = 'auto';
      noteEl.style.height = noteEl.scrollHeight + 'px';
    });
    noteEl.addEventListener('blur', () => {
      d.note = noteEl.value;
      scheduleSave();
    });
    requestAnimationFrame(() => {
      noteEl.style.height = 'auto';
      noteEl.style.height = noteEl.scrollHeight + 'px';
    });

    const stamp = card.querySelector('.stamp');
    stamp.addEventListener('click', () => {
      const idx = STATUS.indexOf(d.status);
      d.status = STATUS[(idx + 1) % STATUS.length];
      scheduleSave();
      render();
    });

    const deleteBtn = card.querySelector('.delete-btn');
    let confirmState = false;
    deleteBtn.addEventListener('click', () => {
      if(!confirmState){
        confirmState = true;
        deleteBtn.textContent = '✕ confirmar';
        deleteBtn.classList.add('delete-confirm');
        setTimeout(() => {
          if(confirmState){
            confirmState = false;
            deleteBtn.textContent = '✕';
            deleteBtn.classList.remove('delete-confirm');
          }
        }, 3000);
      } else {
        state.demands = state.demands.filter(x => x.id !== d.id);
        scheduleSave();
        render();
      }
    });

    return card;
  }

  document.getElementById('addFrontBtn').addEventListener('click', () => {
    const f = { id: uid(), name: 'Nova frente', createdAt: Date.now() };
    state.fronts.push(f);
    state.activeFrontId = f.id;
    state.activeFilter = 'all';
    scheduleSave();
    render();
  });

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  loadData();
})();
</script>
</body>
</html>
